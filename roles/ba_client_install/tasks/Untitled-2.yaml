---
# Global Variables
- name: Set global variables
  hosts: localhost
  gather_facts: yes
  vars:
    # TSM Server Configuration
    tsm_server_name: "TSMDBMGR_TSMINST1"
    tsm_admin_id: "tsmuser1"
    tsm_admin_pass: "tsmuser1@@123456789"
    
    # Certificate Management Paths
    gsk8_bin_path: "/usr/local/ibm/gsk8_64/bin/gsk8capicmd_64"
    cert_db_path: "/tsminst1/cert.kdb"
    tsm_base_path: "/cba/components/tsm/8.2.0.000/tsm/tools/gskit"
    cert_source_path: "/tsminst1/cert256.arm"
    
    # Certificate Labels
    old_cert_label: "TSM Server SelfSigned SHA Key"
    root_ca_label: "SP Root CA Cert"
    inter_ca_label: "SP Intermediate CA Cert"
    new_cert_label: "BONJOVI-VM166 SP CA Signed Cert"
    
    # Certificate Files
    root_ca_file: "{{ tsm_base_path }}/root_ca.crt"
    inter_ca_file: "{{ tsm_base_path }}/inter_ca.crt"
    ca_p12_path: "{{ tsm_base_path }}/ca.p12"
    ca_password: "sp3ctrumpr0tect"
    cert_expire_days: 7300
    
    # Host Configuration
    hostname_fqdn: "bonjovi-vm166.storage.tucson.ibm.com"
    hostname_short: "bonjovi-vm166"
    domain_full: "tucson.ibm.com"
    server_ip: "9.11.66.234"
    
    # Temporary Directories
    temp_dir: "/tmp/{{ ansible_date_time.epoch }}-0"
    run_id: "{{ ansible_date_time.epoch }}_{{ 99999999 | random | to_uuid }}"
    temp_run_dir: "/tmp/run_{{ run_id }}"
    
    # Client Configuration
    tsm_client_bin: "/opt/tivoli/tsm/client/ba/bin"
    cert_file_path: "{{ tsm_client_bin }}/cert256.arm"
    
    # Service Configuration
    tsm_service: "tsminst1.service"
    tsm_process: "dsmserv"
    tsm_port: 1500
    restart_timeout: 30
    port_ready_timeout: 180
    
    # Admin Configuration
    tsm_admin_name: "admin"
    tsm_admin_password: "password"
    tsm_min_password_length: 8
  
  tasks:
    - name: Set global facts
      set_fact:
        tsm_server_name: "{{ tsm_server_name }}"
        tsm_admin_id: "{{ tsm_admin_id }}"
        tsm_admin_pass: "{{ tsm_admin_pass }}"
        gsk8_bin_path: "{{ gsk8_bin_path }}"
        cert_db_path: "{{ cert_db_path }}"
        tsm_base_path: "{{ tsm_base_path }}"
        cert_source_path: "{{ cert_source_path }}"
        old_cert_label: "{{ old_cert_label }}"
        root_ca_label: "{{ root_ca_label }}"
        inter_ca_label: "{{ inter_ca_label }}"
        new_cert_label: "{{ new_cert_label }}"
        root_ca_file: "{{ root_ca_file }}"
        inter_ca_file: "{{ inter_ca_file }}"
        ca_p12_path: "{{ ca_p12_path }}"
        ca_password: "{{ ca_password }}"
        cert_expire_days: "{{ cert_expire_days }}"
        hostname_fqdn: "{{ hostname_fqdn }}"
        hostname_short: "{{ hostname_short }}"
        domain_full: "{{ domain_full }}"
        server_ip: "{{ server_ip }}"
        temp_dir: "{{ temp_dir }}"
        run_id: "{{ run_id }}"
        temp_run_dir: "{{ temp_run_dir }}"
        tsm_client_bin: "{{ tsm_client_bin }}"
        cert_file_path: "{{ cert_file_path }}"
        tsm_service: "{{ tsm_service }}"
        tsm_process: "{{ tsm_process }}"
        tsm_port: "{{ tsm_port }}"
        restart_timeout: "{{ restart_timeout }}"
        port_ready_timeout: "{{ port_ready_timeout }}"
        tsm_admin_name: "{{ tsm_admin_name }}"
        tsm_admin_password: "{{ tsm_admin_password }}"
        tsm_min_password_length: "{{ tsm_min_password_length }}"
        cacheable: yes

# Playbook Tasks
- name: Halt IBM Storage Protect server
  hosts: server3
  become: yes
  tasks:
    - name: Halt IBM Storage Protect server
      command: >
        dsmadmc -servername={{ hostvars['localhost']['tsm_server_name'] }} -id={{ hostvars['localhost']['tsm_admin_id'] }} -pass={{ hostvars['localhost']['tsm_admin_pass'] }} halt
      register: halt_result
      changed_when: true
      failed_when: halt_result.rc != 0

- name: TSM Certificate Management
  hosts: server1
  become: yes
  tasks:
    - name: Create temporary directory for certificate operations
      file:
        path: "{{ hostvars['localhost']['temp_dir'] }}"
        state: directory
        mode: '0755'
    
    - name: Delete old self-signed certificate
      command: "{{ hostvars['localhost']['gsk8_bin_path'] }} -cert -delete -db {{ hostvars['localhost']['cert_db_path'] }} -stashed -label '{{ hostvars['localhost']['old_cert_label'] }}'"
      ignore_errors: yes
    
    - name: Add root CA certificate to keystore
      command: "{{ hostvars['localhost']['gsk8_bin_path'] }} -cert -add -db {{ hostvars['localhost']['cert_db_path'] }} -stashed -file {{ hostvars['localhost']['root_ca_file'] }} -label '{{ hostvars['localhost']['root_ca_label'] }}' -format ascii -trust enable"
    
    - name: Add intermediate CA certificate to keystore
      command: "{{ hostvars['localhost']['gsk8_bin_path'] }} -cert -add -db {{ hostvars['localhost']['cert_db_path'] }} -stashed -file {{ hostvars['localhost']['inter_ca_file'] }} -label '{{ hostvars['localhost']['inter_ca_label'] }}' -format ascii -trust enable"
    
    - name: Create certificate signing request
      command: "{{ hostvars['localhost']['gsk8_bin_path'] }} -certreq -create -db {{ hostvars['localhost']['cert_db_path'] }} -stashed -label '{{ hostvars['localhost']['new_cert_label'] }}' -sigalg sha256 -size 2048 -ku digitalSignature,keyEncipherment,keyAgreement -eku clientAuth,serverAuth -dn CN={{ hostvars['localhost']['hostname_fqdn'] }},OU='Spectrum Protect',O=IBM -san_dnsname {{ hostvars['localhost']['hostname_fqdn'] }},{{ hostvars['localhost']['hostname_short'] }}.{{ hostvars['localhost']['domain_full'] }},{{ hostvars['localhost']['hostname_short'] }}.ibm.com,{{ hostvars['localhost']['hostname_short'] }}.com,{{ hostvars['localhost']['hostname_short'] }} -san_ipaddr {{ hostvars['localhost']['server_ip'] }} -file {{ hostvars['localhost']['temp_dir'] }}/cert_request.csr"
    
    - name: Sign the certificate request
      command: "{{ hostvars['localhost']['gsk8_bin_path'] }} -cert -sign -db {{ hostvars['localhost']['ca_p12_path'] }} -pw {{ hostvars['localhost']['ca_password'] }} -file {{ hostvars['localhost']['temp_dir'] }}/cert_request.csr -label '{{ hostvars['localhost']['inter_ca_label'] }}' -target {{ hostvars['localhost']['temp_dir'] }}/cert_signed.csr -sigalg sha256 -expire {{ hostvars['localhost']['cert_expire_days'] }} -preserve"
    
    - name: Receive signed certificate into keystore
      command: "{{ hostvars['localhost']['gsk8_bin_path'] }} -cert -receive -db {{ hostvars['localhost']['cert_db_path'] }} -stashed -file {{ hostvars['localhost']['temp_dir'] }}/cert_signed.csr -default_cert yes"
    
    - name: Set new certificate as default
      command: "{{ hostvars['localhost']['gsk8_bin_path'] }} -cert -setdefault -db {{ hostvars['localhost']['cert_db_path'] }} -stashed -label '{{ hostvars['localhost']['new_cert_label'] }}'"
    
    - name: Clean up temporary directory
      file:
        path: "{{ hostvars['localhost']['temp_dir'] }}"
        state: absent

- name: Copy the certificate from the IBM Storage Protect server
  hosts: server1
  become: yes
  tasks:
    - name: Create unique temporary directory on control node
      local_action:
        module: file
        path: "{{ hostvars['localhost']['temp_run_dir'] }}"
        state: directory
        mode: '0755'
      run_once: yes
    
    - name: Fetch the certificate file
      fetch:
        src: "{{ hostvars['localhost']['cert_source_path'] }}"
        dest: "{{ hostvars['localhost']['temp_run_dir'] }}/cert256.arm"
        flat: yes
    
    - name: Store temp directory path for next play
      set_fact:
        temp_run_dir: "{{ hostvars['localhost']['temp_run_dir'] }}"
        cacheable: yes

- name: Distribute certificate to clients
  hosts: server3
  become: yes
  gather_facts: no
  tasks:
    - name: Copy the certificate to the client machine
      copy:
        src: "{{ hostvars[groups['server1'][0]].temp_run_dir }}/cert256.arm"
        dest: "{{ hostvars['localhost']['cert_file_path'] }}"
        owner: root
        group: root
        mode: '0644'

- name: Cleanup temporary directory
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Remove temporary run directory
      file:
        path: "{{ hostvars['localhost']['temp_run_dir'] }}"
        state: absent
      delegate_to: localhost

- name: Import or Add certificate to TSM client
  hosts: server3
  become: yes
  tasks:
    - name: Verify certificate file exists
      stat:
        path: "{{ hostvars['localhost']['cert_file_path'] }}"
      register: cert_file_stat
      failed_when: not cert_file_stat.stat.exists
    
    - name: Remove existing dsmcert files
      shell: "cd {{ hostvars['localhost']['tsm_client_bin'] }} && rm -rf dsmcert.*"
      args:
        warn: false
    
    - name: Add certificate to TSM client configuration
      command: "dsmcert -add -server {{ hostvars['localhost']['tsm_server_name'] }} -file {{ hostvars['localhost']['cert_file_path'] }}"
      register: dsmcert_result
    
    - name: Display command output
      debug:
        var: dsmcert_result.stdout_lines

- name: Start or Restart TSM service
  hosts: server1
  become: yes
  tasks:
    - name: Check service status before restart
      command: systemctl status {{ hostvars['localhost']['tsm_service'] }}
      register: service_status_before
      failed_when: false
      changed_when: false
    
    - name: Display service status before restart
      debug:
        var: service_status_before.stdout_lines
    
    - name: Check TSM process before restart
      shell: ps -ef | grep -i {{ hostvars['localhost']['tsm_process'] }} | grep -v grep
      register: process_status_before
      failed_when: false
      changed_when: false
    
    - name: Display process status before restart
      debug:
        var: process_status_before.stdout_lines
    
    - name: Restart TSM service
      systemd:
        name: "{{ hostvars['localhost']['tsm_service'] }}"
        state: restarted
      async: "{{ hostvars['localhost']['restart_timeout'] }}"
      poll: 5
      register: service_restart
      failed_when: false
    
    - name: Wait a moment for service to initialize
      pause:
        seconds: 5
    
    - name: Check TSM process after restart
      shell: ps -ef | grep -i {{ hostvars['localhost']['tsm_process'] }} | grep -v grep
      register: process_status_after
      failed_when: false
      changed_when: false
      retries: 6
      delay: 5
      until: process_status_after.rc == 0
    
    - name: Display process status after restart
      debug:
        var: process_status_after.stdout_lines
    
    - name: Check which process is using port {{ hostvars['localhost']['tsm_port'] }}
      shell: lsof -i :{{ hostvars['localhost']['tsm_port'] }} -n -P | grep LISTEN || netstat -tlnp | grep :{{ hostvars['localhost']['tsm_port'] }}
      register: port_check
      failed_when: false
      changed_when: false
    
    - name: Display port usage information
      debug:
        var: port_check.stdout_lines
    
    - name: Wait for port {{ hostvars['localhost']['tsm_port'] }} to be ready
      wait_for:
        port: "{{ hostvars['localhost']['tsm_port'] }}"
        host: localhost
        state: started
        timeout: "{{ hostvars['localhost']['port_ready_timeout'] }}"
        delay: 5
      register: port_ready
    
    - name: Verify service is active
      command: systemctl is-active {{ hostvars['localhost']['tsm_service'] }}
      register: service_active
      failed_when: service_active.stdout != 'active'
      changed_when: false
    
    - name: Display final service status
      debug:
        msg: "TSM service {{ hostvars['localhost']['tsm_service'] }} is running and port {{ hostvars['localhost']['tsm_port'] }} is ready"

- name: Configure TSM admin and password policy
  hosts: server3
  become: yes
  tasks:
    - name: Wait until TSM accepts admin commands
      shell: >
        dsmadmc -servername={{ hostvars['localhost']['tsm_server_name'] }}
        -id={{ hostvars['localhost']['tsm_admin_id'] }}
        -pass={{ hostvars['localhost']['tsm_admin_pass'] }}
        "q status"
      register: tsm_ready
      retries: 30
      delay: 10
      until: tsm_ready.rc == 0
    
    - name: Set minimum password length
      shell: >
        dsmadmc -servername={{ hostvars['localhost']['tsm_server_name'] }}
        -id={{ hostvars['localhost']['tsm_admin_id'] }}
        -pass={{ hostvars['localhost']['tsm_admin_pass'] }}
        "SET MINPWLENGTH {{ hostvars['localhost']['tsm_min_password_length'] }}"
      register: setminpw
      failed_when: setminpw.rc not in [0,10]
    
    - name: Register admin
      shell: >
        dsmadmc -servername={{ hostvars['localhost']['tsm_server_name'] }}
        -id={{ hostvars['localhost']['tsm_admin_id'] }}
        -pass={{ hostvars['localhost']['tsm_admin_pass'] }}
        "REGISTER ADMIN {{ hostvars['localhost']['tsm_admin_name'] }} {{ hostvars['localhost']['tsm_admin_password'] }}"
      register: regadmin
      failed_when: regadmin.rc not in [0,10]
    
    - name: Grant system authority
      shell: >
        dsmadmc -servername={{ hostvars['localhost']['tsm_server_name'] }}
        -id={{ hostvars['localhost']['tsm_admin_id'] }}
        -pass={{ hostvars['localhost']['tsm_admin_pass'] }}
        "GRANT AUTHORITY {{ hostvars['localhost']['tsm_admin_name'] }} classes=system"
      register: grantauth
      failed_when: grantauth.rc not in [0,10]